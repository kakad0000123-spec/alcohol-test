name: LINE Notify Cron

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger LINE notification check
        run: |
          curl -s -X GET https://alcohol-test-tawny.vercel.app/api/cron/line-notify -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" -w "HTTP %{http_code}" --max-time 30
